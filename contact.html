<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"><title>FADPROS - Contact</title></head>
<body>
    <header><nav><div class="logo">FADPROS</div><ul><li><a href="index.html">Accueil</a></li><li><a href="portfolio.html">Portfolio</a></li><li><a href="gestion.html">Gestion</a></li><li><a href="contact.html">Contact</a></li></ul></nav></header>
    <main><section><h2>Contactez FADPROS</h2>
        <form action="https://formspree.io/f/ton-identifiant" method="POST">
            <input type="text" name="nom" placeholder="Votre nom" required>
            <select id="serviceSelect" onchange="updateWhatsAppLink()">
                <option value="Informatique">Informatique</option>
                <option value="Électrotechnique">Électrotechnique</option>
            </select>
            <textarea name="message" placeholder="Votre message"></textarea>
            <button type="submit">Envoyer par Email</button>
        </form>
        <hr><a id="whatsappLink" href="https://wa.me/2290142303188?text=Bonjour" target="_blank" class="whatsapp-button">Discuter sur WhatsApp</a>
    </section></main>
    <script>
        function updateWhatsAppLink() {
            var s = document.getElementById("serviceSelect").value;
            document.getElementById("whatsappLink").href = "https://wa.me/2290142303188?text=Intéressé par : " + s;
        }
    </script>
</body></html>
